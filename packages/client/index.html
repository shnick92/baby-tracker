<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Baby Tracker</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash of the
      // wrong theme. Mirrors stores/settingsStore.ts (key: tracker-settings).
      try {
        var pref = (JSON.parse(localStorage.getItem('tracker-settings')) || {}).state || {}
        var dark =
          pref.theme === 'light'
            ? false
            : pref.theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
              : true
        document.documentElement.classList.toggle('dark', dark)
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', dark ? '#111827' : '#ffffff')
      } catch (e) { /* default dark stays */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
