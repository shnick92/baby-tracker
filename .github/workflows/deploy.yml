name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build · Push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tracker-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tracker-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/client.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tracker-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tracker-client:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_SOCKET_URL=
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
            VITE_FAMILY_SURNAME=${{ vars.VITE_FAMILY_SURNAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
