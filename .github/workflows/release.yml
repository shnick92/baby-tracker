name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number — semver, no v prefix (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push tags to the private repo
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Validate semver format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver format (e.g. 1.0.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists on the private repo"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag private repo
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Tag public repo and create GitHub release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Get the current HEAD of the public repo (already synced by the last push to main)
          PUBLIC_SHA=$(gh api repos/shnick92/baby-tracker/branches/main --jq '.commit.sha')

          # Create the tag on the public repo pointing at its current main HEAD
          gh api repos/shnick92/baby-tracker/git/refs \
            -X POST \
            -f ref="refs/tags/v${{ inputs.version }}" \
            -f sha="$PUBLIC_SHA"

          # Create a GitHub release with auto-generated notes from commit history
          gh release create v${{ inputs.version }} \
            --repo shnick92/baby-tracker \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --latest
