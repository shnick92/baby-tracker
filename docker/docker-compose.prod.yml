name: tracker

services:
  nginx:
    image: ${DOCKERHUB_USERNAME}/tracker-client:latest
    ports:
      - "${TAILSCALE_IP}:80:80"
      - "${TAILSCALE_IP}:443:443"
    volumes:
      - /mnt/user/appdata/tracker/certs:/etc/ssl/tailscale:ro
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ${DOCKERHUB_USERNAME}/tracker-server:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      NODE_ENV: production
      PORT: ${PORT:-3001}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      RP_ID: ${RP_ID}
      RP_NAME: ${RP_NAME}
      RP_ORIGIN: ${RP_ORIGIN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      FAMILY_NAME: ${FAMILY_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      MAX_USERS: ${MAX_USERS:-2}
      TIMEZONE: ${TIMEZONE}
      APP_URL: ${APP_URL}
      SEED_USER_1_NAME: ${SEED_USER_1_NAME}
      SEED_USER_1_EMAIL: ${SEED_USER_1_EMAIL}
      SEED_USER_1_PASSWORD: ${SEED_USER_1_PASSWORD}
      SEED_USER_1_PHONE: ${SEED_USER_1_PHONE:-}
      SEED_USER_2_NAME: ${SEED_USER_2_NAME}
      SEED_USER_2_EMAIL: ${SEED_USER_2_EMAIL}
      SEED_USER_2_PASSWORD: ${SEED_USER_2_PASSWORD}
      SEED_USER_2_PHONE: ${SEED_USER_2_PHONE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "prisma migrate deploy && node dist/index.js"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    environment:
      - DOCKER_API_VERSION=1.54
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 tracker-nginx-1 tracker-server-1 tracker-watchtower-1
    restart: unless-stopped

volumes:
  db_data:
